name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o pathman.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: pathman.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
