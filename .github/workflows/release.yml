name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build amd64
        working-directory: pathman
        run: go build -ldflags="-s -w" -o ../pathman-windows-amd64.exe .
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Build arm64
        working-directory: pathman
        run: go build -ldflags="-s -w" -o ../pathman-windows-arm64.exe .
        env:
          GOOS: windows
          GOARCH: arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pathman-windows-amd64.exe
            pathman-windows-arm64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
